<!DOCTYPE html>
<html>
<head>
    <title>For My Love ❤️</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            overflow: hidden;
            height: 100vh;
        }

        h1 {
            margin-top: 150px;
            font-size: 40px;
            color: white;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: absolute;
        }

        #yesBtn {
            background-color: #4CAF50;
            color: white;
            left: 45%;
            top: 60%;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            left: 55%;
            top: 60%;
        }
    </style>
</head>
<body>

    <h1>Will You Marry Me? 💍❤️</h1>

    <button id="yesBtn" onclick="goToYes()">Yes 💖</button>
    <button id="noBtn" onclick="moveNoButton()">No 😢</button>

    <script>
        function goToYes() {
            window.location.href = "page2.html";
        }

        function moveNoButton() {
            var button = document.getElementById("noBtn");

            var x = Math.random() * (window.innerWidth - 100);
            var y = Math.random() * (window.innerHeight - 50);

            button.style.left = x + "px";
            button.style.top = y + "px";
        }
    </script>

</body>
</html>
